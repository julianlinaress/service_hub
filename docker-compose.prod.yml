services:
  notifier:
    image: ${NOTIFIER_IMAGE:-ghcr.io/julianlinaress/service_hub_notifier:sha-local}
    environment:
      PORT: "8081"
      DELIVERY_TIMEOUT_MS: "5000"
      SHUTDOWN_TIMEOUT_MS: "10000"
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    healthcheck:
      test: ["CMD", "/app/service_hub_notifier", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.50
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    networks:
      - service_hub_net

  phoenix:
    image: ${PHOENIX_IMAGE:-ghcr.io/julianlinaress/service_hub:sha-local}
    environment:
      PHX_SERVER: "true"
      PORT: "4000"
      PHX_BIND_ALL: "true"
      NOTIFIER_BASE_URL: "http://notifier:8081"
      NOTIFIER_INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    depends_on:
      notifier:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.00
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
    networks:
      - service_hub_net

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      phoenix:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    networks:
      - service_hub_net

networks:
  service_hub_net:
    name: service_hub_net
    driver: bridge
